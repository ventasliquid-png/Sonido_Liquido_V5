<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <rect width="100" height="100" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect x="0"  y="0"  width="50" height="50" fill="#39FF14"/>
    <rect x="50" y="0"  width="50" height="50" fill="#FFE000"/>
    <rect x="0"  y="50" width="50" height="50" fill="#00FFFF"/>
    <rect x="50" y="50" width="50" height="50" fill="#FF3EFF"/>
  </g>
  <text x="50%" y="54%" dominant-baseline="central" text-anchor="middle"
